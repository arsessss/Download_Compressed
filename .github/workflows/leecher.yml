name: Transfer file to GitHub (supports YouTube & TikTok)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - YouTube, TikTok, or direct link'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'Link 2 (optional)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'Link 3 (optional)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'Link 4 (optional)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'Link 5 (optional)'
        required: false
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      tiktok_watermark:
        description: 'TikTok - include watermark?'
        required: false
        type: boolean
        default: true
      zip_password:
        description: '🔒 Set password for archive file'
        required: false
        type: string
        default: ''
      split_size:
        description: 'Maximum size per chunk (MB)'
        required: false
        type: choice
        default: '95'
        options:
          - '25'
          - '50'
          - '95'
      delete_old_archives:
        description: 'Delete old archives'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: download-queue
  cancel-in-progress: false
  queue: max

jobs:
  download-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clean old archives
        if: ${{ github.event.inputs.delete_old_archives == 'true' }}
        run: |
          echo "Cleaning old archives..."
          rm -rf downloads/ 2>/dev/null || true
          rm -f *.7z *.7z.* 2>/dev/null || true
          echo "Cleanup complete"

      - name: Install dependencies
        run: |
          pip3 install yt-dlp --break-system-packages || pip3 install yt-dlp
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg p7zip-full
          echo "✅ Dependencies installed"

      - name: Create cookies file
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies created"
          else
            echo "⚠️ No cookies"
          fi

      - name: Parse inputs
        id: parse
        run: |
          SIZE="${{ github.event.inputs.split_size }}"
          echo "split_mb=${SIZE}" >> $GITHUB_OUTPUT
          cat > urls.txt << 'EOF'
          ${{ github.event.inputs.file_url_1 }}
          ${{ github.event.inputs.file_url_2 }}
          ${{ github.event.inputs.file_url_3 }}
          ${{ github.event.inputs.file_url_4 }}
          ${{ github.event.inputs.file_url_5 }}
          EOF
          sed -i '/^$/d' urls.txt
          sed -i 's/^[[:space:]]*//;s/[[:space:]]*$//' urls.txt
          echo "URLs to process:"
          cat -n urls.txt

      - name: Download files
        id: download_files
        run: |
          mkdir -p downloads
          total=$(cat urls.txt | wc -l)
          counter=1
          success=0
          YT_QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          while IFS= read -r url; do
            echo "========================================="
            echo "[$counter/$total] Processing: $url"
            
            if echo "$url" | grep -qE '(youtube\.com|youtu\.be)'; then
              echo "📺 YouTube video"
              if [ -f cookies.txt ]; then
                yt-dlp --cookies cookies.txt -f "best[height<=${YT_QUALITY}]" -o "downloads/video_${counter}.mp4" "$url"
              else
                yt-dlp -f "best[height<=${YT_QUALITY}]" -o "downloads/video_${counter}.mp4" "$url"
              fi
              if [ -f "downloads/video_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-50)
                if [ -n "$TITLE" ]; then
                  mv "downloads/video_${counter}.mp4" "downloads/${TITLE}.mp4"
                fi
                echo "✅ Downloaded YouTube video"
                success=$((success + 1))
              else
                echo "❌ YouTube download failed"
              fi
              
            elif echo "$url" | grep -qE '(tiktok\.com|vm\.tiktok)'; then
              echo "📱 TikTok video"
              yt-dlp -f "best" -o "downloads/tiktok_${counter}.mp4" "$url"
              if [ -f "downloads/tiktok_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-40)
                if [ -n "$TITLE" ]; then
                  mv "downloads/tiktok_${counter}.mp4" "downloads/${TITLE}.mp4"
                fi
                echo "✅ Downloaded TikTok video"
                success=$((success + 1))
              else
                echo "❌ TikTok download failed"
              fi
              
            else
              echo "🔗 Direct download"
              FILENAME=$(basename "$url" | cut -d'?' -f1)
              if [ -z "$FILENAME" ]; then
                FILENAME="file_${counter}"
              fi
              curl -L --fail --retry 3 -o "downloads/${FILENAME}" "$url"
              if [ -f "downloads/${FILENAME}" ]; then
                echo "✅ Downloaded: ${FILENAME}"
                success=$((success + 1))
              else
                echo "❌ Direct download failed"
              fi
            fi
            
            counter=$((counter + 1))
          done < urls.txt
          
          echo "success_count=${success}" >> $GITHUB_OUTPUT
          echo "✅ Downloaded ${success}/${total} files"

      - name: Check downloaded files
        run: |
          echo "Files in downloads folder:"
          ls -la downloads/ || echo "No files found!"
          if [ ! -d "downloads" ] || [ -z "$(ls -A downloads)" ]; then
            echo "No files downloaded, creating dummy file"
            mkdir -p downloads
            echo "No files were downloaded successfully" > downloads/ERROR.txt
          fi

      - name: Archive files
        id: process_files
        run: |
          SPLIT_MB=${{ steps.parse.outputs.split_mb }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads_archive/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          PASSWORD="${{ github.event.inputs.zip_password }}"
          
          echo "Archive folder: ${FOLDER}"
          echo "Split size: ${SPLIT_MB}MB"
          
          counter=0
          for file in downloads/*; do
            [ -f "$file" ] || continue
            counter=$((counter + 1))
            BASENAME=$(basename "$file")
            NAME="${BASENAME%.*}"
            SIZE_MB=$(du -m "$file" | cut -f1)
            
            echo "Processing: $BASENAME (${SIZE_MB} MB)"
            
            if [ -n "$PASSWORD" ]; then
              7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "${FOLDER}/${NAME}.7z" "$file"
            else
              7z a -mx=3 -v${SPLIT_MB}m "${FOLDER}/${NAME}.7z" "$file"
            fi
            
            # If only one part, remove the .001 extension
            if [ -f "${FOLDER}/${NAME}.7z.001" ] && [ ! -f "${FOLDER}/${NAME}.7z.002" ]; then
              mv "${FOLDER}/${NAME}.7z.001" "${FOLDER}/${NAME}.7z"
            fi
          done
          
          rm -rf downloads
          echo "processed_count=${counter}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT
          
          if [ $counter -eq 0 ]; then
            echo "⚠️ No files were archived!"
            mkdir -p "$FOLDER"
            echo "No files were downloaded successfully" > "$FOLDER/ERROR.txt"
          fi

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          if [ -d "$FOLDER" ]; then
            git add "$FOLDER/"*.7z* 2>/dev/null || true
            git add "$FOLDER/"*.txt 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Add downloaded files from ${FOLDER}"
              git push origin main
              echo "✅ Changes pushed"
            fi
          else
            echo "❌ No folder to commit"
            exit 1
          fi

      - name: Summary
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          echo "## 📊 Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Successful downloads | ${{ steps.download_files.outputs.success_count }} / ${{ steps.parse.outputs.url_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Archive folder | ${FOLDER} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Workflow completed |" >> $GITHUB_STEP_SUMMARY
