name: Transfer file to GitHub (supports YouTube & TikTok)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - YouTube, TikTok, or direct link'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'Link 2 (optional)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'Link 3 (optional)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'Link 4 (optional)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'Link 5 (optional)'
        required: false
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      tiktok_watermark:
        description: 'TikTok - include watermark?'
        required: false
        type: boolean
        default: true
      zip_password:
        description: 'Set password for archive file'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: download-queue
  cancel-in-progress: false
  queue: max

jobs:
  download-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          pip3 install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg p7zip-full

      - name: Create cookies file
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          fi

      - name: Download files
        id: download
        run: |
          mkdir -p downloads
          success=0
          counter=1
          YT_QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          for url in "${{ github.event.inputs.file_url_1 }}" "${{ github.event.inputs.file_url_2 }}" "${{ github.event.inputs.file_url_3 }}" "${{ github.event.inputs.file_url_4 }}" "${{ github.event.inputs.file_url_5 }}"; do
            if [ -z "$url" ]; then
              continue
            fi
            
            echo "Processing: $url"
            
            if echo "$url" | grep -qE '(youtube|youtu.be)'; then
              if [ -f cookies.txt ]; then
                yt-dlp --cookies cookies.txt -f "best[height<=${YT_QUALITY}]" -o "downloads/video_${counter}.mp4" "$url"
              else
                yt-dlp -f "best[height<=${YT_QUALITY}]" -o "downloads/video_${counter}.mp4" "$url"
              fi
              
              if [ -f "downloads/video_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-50)
                mv "downloads/video_${counter}.mp4" "downloads/${TITLE}.mp4"
                echo "Downloaded: ${TITLE}.mp4"
                success=$((success + 1))
              fi
              
            elif echo "$url" | grep -qE '(tiktok|vm.tiktok)'; then
              yt-dlp -f "best" -o "downloads/tiktok_${counter}.mp4" "$url"
              
              if [ -f "downloads/tiktok_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-40)
                mv "downloads/tiktok_${counter}.mp4" "downloads/${TITLE}.mp4"
                echo "Downloaded: ${TITLE}.mp4"
                success=$((success + 1))
              fi
              
            else
              FILENAME=$(basename "$url" | cut -d'?' -f1)
              [ -z "$FILENAME" ] && FILENAME="file_${counter}"
              curl -L -o "downloads/${FILENAME}" "$url"
              if [ -f "downloads/${FILENAME}" ]; then
                echo "Downloaded: ${FILENAME}"
                success=$((success + 1))
              fi
            fi
            
            counter=$((counter + 1))
          done
          
          echo "success_count=${success}" >> $GITHUB_OUTPUT

      - name: Create archive
        id: archive
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          PASSWORD="${{ github.event.inputs.zip_password }}"
          
          if [ -n "$PASSWORD" ]; then
            7z a -p"$PASSWORD" -mx=3 "download_${TIMESTAMP}.7z" downloads/
          else
            7z a -mx=3 "download_${TIMESTAMP}.7z" downloads/
          fi
          
          echo "archive_name=download_${TIMESTAMP}.7z" >> $GITHUB_OUTPUT
          rm -rf downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.7z
          git commit -m "Add downloaded archive" || echo "No changes"
          git push origin main

      - name: Summary
        run: |
          echo "Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Successful downloads | ${{ steps.download.outputs.success_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Archive | ${{ steps.archive.outputs.archive_name }} |" >> $GITHUB_STEP_SUMMARY