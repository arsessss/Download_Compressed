name: Transfer file to GitHub

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link (YouTube or direct)'
        required: true
        type: string
      youtube_quality:
        description: 'Quality for YouTube'
        default: '1080'
        type: choice
        options:
          - '1080'
          - '720'
          - '480'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp
      - name: Download
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          mkdir -p downloads
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            yt-dlp -f "best[height<=${{ github.event.inputs.youtube_quality }}]" -o "downloads/video.mp4" "$URL"
          else
            curl -L -o "downloads/file" "$URL"
          fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: downloaded
          path: downloads/
