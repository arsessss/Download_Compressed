name: Transfer file to GitHub (supports YouTube & TikTok)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - YouTube, TikTok, or direct link'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'Link 2 (optional)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'Link 3 (optional)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'Link 4 (optional)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'Link 5 (optional)'
        required: false
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      tiktok_watermark:
        description: 'TikTok - include watermark?'
        required: false
        type: boolean
        default: true
      zip_password:
        description: '🔒 Set password for archive file'
        required: false
        type: string
        default: ''
      split_size:
        description: 'Maximum size per chunk (MB)'
        required: false
        type: choice
        default: '95  (maximum - for large files)'
        options:
          - '25  (slow internet - small files)'
          - '50  (medium)'
          - '95  (maximum - for large files)'
      delete_old_archives:
        description: 'Delete old archives (if checked, all previous archives will be removed)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: download-queue
  cancel-in-progress: false
  queue: max

jobs:
  download-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clean old archives
        if: ${{ github.event.inputs.delete_old_archives == 'true' }}
        run: |
          echo "Cleaning old archives..."
          find . -maxdepth 1 -type f \( -name "*.7z.*" -o -name "*.7z" \) -exec rm -v {} \;
          find . -maxdepth 1 -type d -name "downloads" -exec rm -rf {} \;
          git rm --cached *.7z.* 2>/dev/null || true
          git rm --cached *.7z 2>/dev/null || true
          git rm --cached -r downloads 2>/dev/null || true
          echo "Old archives cleaned."

      - name: Install dependencies
        run: |
          # Install yt-dlp for YouTube and TikTok
          pip3 install yt-dlp --break-system-packages || pip3 install yt-dlp
          
          # Install FFmpeg
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg p7zip-full
          
          # Install TikTok downloader alternative
          pip3 install tikdown --break-system-packages || pip3 install tikdown
          
          echo "✅ Dependencies installed"

      - name: Create cookies file from secret (for YouTube)
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies file created"
          else
            echo "⚠️ No cookies secret found, YouTube may have restrictions"
          fi

      - name: Parse inputs
        id: parse
        run: |
          SIZE=$(echo "${{ github.event.inputs.split_size }}" | grep -oP '\d+')
          echo "split_mb=${SIZE:-95}" >> $GITHUB_OUTPUT
          cat > urls.txt << URLEOF
          ${{ github.event.inputs.file_url_1 }}
          ${{ github.event.inputs.file_url_2 }}
          ${{ github.event.inputs.file_url_3 }}
          ${{ github.event.inputs.file_url_4 }}
          ${{ github.event.inputs.file_url_5 }}
          URLEOF
          sed -i '/^$/d' urls.txt
          sed -i 's/^[ \t]*//;s/[ \t]*$//' urls.txt
          total=$(wc -l < urls.txt)
          echo "url_count=${total}" >> $GITHUB_OUTPUT
          echo "URL count: ${total}"
          cat -n urls.txt

      - name: Download files (YouTube, TikTok, or direct)
        id: download_files
        run: |
          mkdir -p files
          total=${{ steps.parse.outputs.url_count }}
          counter=1
          success=0
          YT_QUALITY="${{ github.event.inputs.youtube_quality }}"
          TT_WATERMARK="${{ github.event.inputs.tiktok_watermark }}"

          while IFS= read -r url; do
            echo "========================================="
            echo "[$counter/$total] Processing: $url"

            # YouTube detection
            if echo "$url" | grep -qE '(youtube\.com|youtu\.be)'; then
              echo "📺 Detected YouTube link"
              echo "Quality: ${YT_QUALITY}p"
              
              if [ -f cookies.txt ]; then
                yt-dlp --cookies cookies.txt \
                       -f "bestvideo[height<=${YT_QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${YT_QUALITY}]" \
                       --merge-output-format mp4 \
                       -o "files/yt_${counter}.%(ext)s" \
                       "$url"
              else
                yt-dlp -f "best[height<=${YT_QUALITY}]" \
                       -o "files/yt_${counter}.%(ext)s" \
                       "$url"
              fi
              
              DOWNLOADED_FILE=$(ls files/yt_${counter}.* 2>/dev/null | head -1)
              if [ -f "$DOWNLOADED_FILE" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | tr -cd 'a-zA-Z0-9_.- ' | cut -c1-50)
                mv "$DOWNLOADED_FILE" "files/${TITLE}.mp4"
                size=$(ls -lh "files/${TITLE}.mp4" | awk '{print $5}')
                echo "✅ Downloaded: ${TITLE}.mp4 ($size)"
                success=$((success + 1))
              else
                echo "❌ Failed to download YouTube video"
              fi
              
            # TikTok detection
            elif echo "$url" | grep -qE '(tiktok\.com|vm\.tiktok)'; then
              echo "📱 Detected TikTok link"
              if [ "$TT_WATERMARK" = "true" ]; then
                echo "Downloading with watermark"
              else
                echo "Downloading without watermark"
              fi
              
              # Use yt-dlp for TikTok (works well)
              if [ "$TT_WATERMARK" = "true" ]; then
                yt-dlp -f "best" -o "files/tt_${counter}.%(ext)s" "$url"
              else
                yt-dlp -f "best" --config-location /dev/null \
                       --add-header "User-Agent:Mozilla/5.0" \
                       -o "files/tt_${counter}.%(ext)s" \
                       "$url"
              fi
              
              DOWNLOADED_FILE=$(ls files/tt_${counter}.* 2>/dev/null | head -1)
              if [ -f "$DOWNLOADED_FILE" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | tr -cd 'a-zA-Z0-9_.- ' | cut -c1-40)
                mv "$DOWNLOADED_FILE" "files/tiktok_${TITLE}.mp4"
                size=$(ls -lh "files/tiktok_${TITLE}.mp4" | awk '{print $5}')
                echo "✅ Downloaded TikTok: ${TITLE}.mp4 ($size)"
                success=$((success + 1))
              else
                echo "❌ Failed to download TikTok video"
              fi
              
            # Direct download
            else
              echo "🔗 Direct download"
              FILENAME=$(basename "$url" | cut -d'?' -f1)
              if [ -z "$FILENAME" ]; then
                FILENAME="file_${counter}"
              fi
              
              if curl -L --fail --retry 3 --connect-timeout 30 -o "files/${FILENAME}" "$url"; then
                size=$(ls -lh "files/${FILENAME}" | awk '{print $5}')
                echo "✅ Downloaded: ${FILENAME} ($size)"
                success=$((success + 1))
              else
                echo "❌ Failed: $url"
              fi
            fi
            
            counter=$((counter + 1))
          done < urls.txt

          echo "success_count=${success}" >> $GITHUB_OUTPUT
          echo "✅ Downloaded ${success}/${total} files successfully"

      - name: Process and archive each file
        id: process_files
        run: |
          SPLIT_MB=${{ steps.parse.outputs.split_mb }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          PASSWORD="${{ github.event.inputs.zip_password }}"

          echo "Output folder: ${FOLDER}"
          echo "Split size: ${SPLIT_MB}MB"

          counter=0
          for file in files/*; do
            [ -f "$file" ] || continue
            counter=$((counter + 1))
            echo "Processing: $(basename "$file")"
            FILENAME=$(basename "$file")
            if [ "${#PASSWORD}" -gt 0 ]; then
              7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "${FOLDER}/${FILENAME}.7z" "$file"
            else
              7z a -mx=3 -v${SPLIT_MB}m "${FOLDER}/${FILENAME}.7z" "$file"
            fi
            if [ -f "${FOLDER}/${FILENAME}.7z.001" ] && [ ! -f "${FOLDER}/${FILENAME}.7z.002" ]; then
              mv "${FOLDER}/${FILENAME}.7z.001" "${FOLDER}/${FILENAME}.7z"
            fi
          done
          rm -rf files
          echo "processed_count=${counter}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Commit and Push all chunks
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          git add "${FOLDER}/"*.7z* 2>/dev/null || true
          if ! git diff --staged --quiet; then
            file_count=$(git diff --staged --name-only | wc -l)
            git commit -m "Add files in ${FOLDER} (${file_count} chunks)"
            push_success=false
            max_attempts=15
            for attempt in $(seq 1 $max_attempts); do
              git pull --rebase origin main 2>/dev/null || true
              if git push origin main; then
                push_success=true
                break
              else
                sleep 20
              fi
            done
            if [ "$push_success" = false ]; then
              exit 1
            fi
          fi

      - name: Summary
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          TOTAL_SIZE=$(du -sh "$FOLDER" 2>/dev/null | awk '{print $1}')
          [ -z "$TOTAL_SIZE" ] && TOTAL_SIZE="N/A"
          echo "Job completed! Folder: $FOLDER, Size: $TOTAL_SIZE"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📊 Execution Summary
          | Item | Value |
          |------|-------|
          | Successful downloads | ${{ steps.download_files.outputs.success_count }} / ${{ steps.parse.outputs.url_count }} |
          | Files processed | ${{ steps.process_files.outputs.processed_count }} |
          | Max chunk size | ${{ steps.parse.outputs.split_mb }} MB |
          | Total size | ${TOTAL_SIZE} |
          | 📂 Download folder | [${FOLDER}](https://github.com/${{ github.repository }}/tree/main/${FOLDER}) |
          | Status | ✅ Success |
          ---
          **Support for:** YouTube • TikTok • Direct Links
          
          Dedicated to all those who have no way but to pass... - [Hossein Balanj](https://balanj.ir)
          EOF
