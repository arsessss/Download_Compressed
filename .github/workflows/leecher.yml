name: Transfer file to GitHub (supports YouTube links)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'Link 2 (optional)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'Link 3 (optional)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'Link 4 (optional)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'Link 5 (optional)'
        required: false
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      zip_password:
        description: '🔒 Set password for archive file'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: sci-hub-queue
  cancel-in-progress: false
  queue: max

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Clean old archives (ALWAYS)
        run: |
          echo "Cleaning old archives..."
          find . -maxdepth 1 -type f \( -name "*.zip" \) -exec rm -v {} \;
          find . -maxdepth 1 -type d -name "downloads" -exec rm -rf {} \;
          git rm --cached *.zip 2>/dev/null || true
          git rm --cached -r downloads 2>/dev/null || true
          echo "Old archives cleaned."

      - name: Install dependencies (curl, jq, 7z)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full jq curl

      - name: Parse inputs
        id: parse
        run: |
          cat > urls.txt << URLEOF
          ${{ github.event.inputs.file_url_1 }}
          ${{ github.event.inputs.file_url_2 }}
          ${{ github.event.inputs.file_url_3 }}
          ${{ github.event.inputs.file_url_4 }}
          ${{ github.event.inputs.file_url_5 }}
          URLEOF
          sed -i '/^$/d' urls.txt
          sed -i 's/^[ \t]*//;s/[ \t]*$//' urls.txt
          total=$(wc -l < urls.txt)
          echo "url_count=${total}" >> $GITHUB_OUTPUT
          echo "URL count: ${total}"
          cat -n urls.txt

      - name: Download files (YouTube via Cobalt API, direct via curl)
        id: download_files
        run: |
          mkdir -p files
          total=${{ steps.parse.outputs.url_count }}
          counter=1
          success=0
          YT_QUALITY="${{ github.event.inputs.youtube_quality }}"

          while IFS= read -r url; do
            echo "========================================="
            echo "[$counter/$total] Processing: $url"

            if echo "$url" | grep -qE '(youtube\.com|youtu\.be)'; then
              echo "Detected YouTube link. Using Cobalt API..."
              echo "Requested quality: ${YT_QUALITY}p"

              # Map quality to Cobalt format
              case "${YT_QUALITY}" in
                "2160") COBALT_QUALITY="2160" ;;
                "1440") COBALT_QUALITY="1440" ;;
                "1080") COBALT_QUALITY="1080" ;;
                "720")  COBALT_QUALITY="720" ;;
                "480")  COBALT_QUALITY="480" ;;
                "360")  COBALT_QUALITY="360" ;;
                *)      COBALT_QUALITY="1080" ;;
              esac

              # Call Cobalt API (version 8 - still working as of 2026)
              API_RESPONSE=$(curl -s -X POST https://api.cobalt.tools/api/json \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -d "{\"url\": \"$url\", \"vQuality\": \"$COBALT_QUALITY\", \"vCodec\": \"h264\", \"aFormat\": \"mp3\"}")

              DOWNLOAD_URL=$(echo "$API_RESPONSE" | jq -r '.url')
              FILENAME=$(echo "$API_RESPONSE" | jq -r '.filename')

              if [ "$DOWNLOAD_URL" != "null" ] && [ -n "$DOWNLOAD_URL" ]; then
                echo "Got download URL, downloading..."
                curl -L -o "files/${FILENAME}" "$DOWNLOAD_URL"
                if [ -f "files/${FILENAME}" ]; then
                  size=$(ls -lh "files/${FILENAME}" | awk '{print $5}')
                  echo "Downloaded: ${FILENAME} ($size)"
                  success=$((success + 1))
                else
                  echo "Failed to download from Cobalt URL"
                fi
              else
                echo "Cobalt API failed. Response: $API_RESPONSE"
                echo "Trying fallback with yt-dlp (might fail)..."
                yt-dlp --cookies cookies.txt -f "best[height<=${YT_QUALITY}]" -o "files/video_${counter}.mp4" "$url" || true
              fi
            else
              echo "Normal direct download"
              FILENAME=$(echo "$url" | sed 's/?.*//' | xargs basename)
              if [ -z "$FILENAME" ]; then
                FILENAME="file_${counter}"
              fi
              echo "Download filename: ${FILENAME}"
              if curl -L --fail --retry 5 --retry-delay 10 --connect-timeout 30 -o "files/${FILENAME}" "$url"; then
                size=$(ls -lh "files/${FILENAME}" | awk '{print $5}')
                echo "Downloaded: ${FILENAME} ($size)"
                success=$((success + 1))
              else
                echo "Failed: $url"
              fi
            fi
            counter=$((counter + 1))
          done < urls.txt

          echo "success_count=${success}" >> $GITHUB_OUTPUT

      - name: Archive files (ZIP format, single file)
        id: process_files
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          PASSWORD="${{ github.event.inputs.zip_password }}"

          echo "Output folder: ${FOLDER}"
          echo "Archive mode: ZIP (single file)"

          counter=0
          for file in files/*; do
            [ -f "$file" ] || continue
            counter=$((counter + 1))
            echo "Processing: $(basename "$file")"
            FILENAME=$(basename "$file")
            BASENAME="${FILENAME%.*}"
            if [ "${#PASSWORD}" -gt 0 ]; then
              7z a -p"$PASSWORD" "${FOLDER}/${BASENAME}.zip" "$file"
            else
              7z a "${FOLDER}/${BASENAME}.zip" "$file"
            fi
          done
          rm -rf files
          echo "processed_count=${counter}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Commit and Push all archives
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          git add "${FOLDER}/"*.zip 2>/dev/null || true
          if ! git diff --staged --quiet; then
            file_count=$(git diff --staged --name-only | wc -l)
            git commit -m "Add files in ${FOLDER} (${file_count} archives)"
            push_success=false
            max_attempts=15
            for attempt in $(seq 1 $max_attempts); do
              git pull --rebase origin main 2>/dev/null || true
              if git push origin main; then
                push_success=true
                break
              else
                sleep 20
              fi
            done
            if [ "$push_success" = false ]; then
              exit 1
            fi
          fi

      - name: Summary
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          TOTAL_SIZE=$(du -sh "$FOLDER" 2>/dev/null | awk '{print $1}')
          [ -z "$TOTAL_SIZE" ] && TOTAL_SIZE="N/A"
          echo "Job completed! Folder: $FOLDER, Size: $TOTAL_SIZE"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📊 Execution Summary
          | Item | Value |
          |------|-------|
          | Successful downloads | ${{ steps.download_files.outputs.success_count }} / ${{ steps.parse.outputs.url_count }} |
          | Files processed | ${{ steps.process_files.outputs.processed_count }} |
          | Total size | ${TOTAL_SIZE} |
          | 📂 Download folder | [${FOLDER}](https://github.com/${{ github.repository }}/tree/main/${FOLDER}) |
          | Status | ✅ Success |
          ---
          Dedicated to all those who have no way but to pass... - [Hossein Balanj](https://balanj.ir)
          EOF