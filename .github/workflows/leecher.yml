name: Simple Download

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'File URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download file
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          FILENAME=$(basename "$URL" | cut -d"?" -f1)
          echo "Downloading from: $URL"
          echo "Saving as: $FILENAME"
          curl -L -o "$FILENAME" "$URL"
          echo "Download complete. File listing:"
          ls -la
      - name: Upload to repo
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "Add downloaded file" || echo "No changes"
          git push origin main
