name: Leech360D Test

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old zip files
        run: git rm -f --ignore-unmatch *.zip

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "Deno installed: $(deno --version)"

      - name: Install yt-dlp
        run: pip3 install yt-dlp

      - name: Setup cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          echo "Cookies file size: $(wc -c < cookies.txt) bytes"
          head -1 cookies.txt

      - name: Download YouTube video
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          echo "Deno path: $(which deno)"
          echo "yt-dlp path: $(which yt-dlp)"
          yt-dlp --version
          yt-dlp --cookies cookies.txt \
            --extractor-args "youtube:player_client=tv,android_sdkless" \
            --js-runtime deno \
            -f "best[height<=${{ github.event.inputs.youtube_quality }}]" \
            -o "video.mp4" \
            "${{ github.event.inputs.file_url_1 }}"

      - name: Create zip
        run: |
          if [ -f video.mp4 ]; then
            zip video.zip video.mp4
            echo "ZIP created"
          else
            echo "No video file found"
            exit 1
          fi

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.zip
          git commit -m "Add video" || true
          git push origin main
