name: Debug YouTube Download

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'YouTube URL'
        required: true
        type: string
      youtube_quality:
        description: 'Quality'
        required: false
        type: choice
        default: '720'
        options:
          - '1080'
          - '720'
          - '480'

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: |
          pip3 install yt-dlp
          
      - name: Check if video exists
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          
          echo "Checking: $URL"
          
          # Try to get video info
          yt-dlp --dump-json --skip-download "$URL" 2>&1
          
      - name: Try download with cookies
        if: ${{ secrets.YT_COOKIES != '' }}
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          
          yt-dlp --cookies cookies.txt -f "best" -o "video.mp4" "$URL"
          
          if [ -f "video.mp4" ]; then
            echo "✅ Download successful!"
            ls -la video.mp4
          else
            echo "❌ Download failed"
          fi
          
      - name: Try download without cookies
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          
          yt-dlp -f "best" -o "video2.mp4" "$URL"
          
          if [ -f "video2.mp4" ]; then
            echo "✅ Download successful without cookies!"
            ls -la video2.mp4
          else
            echo "❌ Download failed without cookies"
          fi
