name: Transfer file to GitHub

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: Link
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
      tiktok_watermark:
        description: Watermark
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install
        run: |
          pip3 install yt-dlp
          sudo apt-get install -y ffmpeg p7zip-full
          curl -fsSL https://deno.land/install.sh | sh
          export PATH="$HOME/.deno/bin:$PATH"
          
      - name: Cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          fi
          
      - name: Download
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          yt-dlp --cookies cookies.txt --extractor-args "youtube:player_client=tv,android_sdkless" --js-runtime deno -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]" --merge-output-format mp4 -o "downloads/video.mp4" "$URL"
                 
      - name: Archive
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          7z a -mx=3 "download_${TIMESTAMP}.7z" downloads/
          
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add *.7z
          git commit -m "Add archive" || echo "No changes"
          git push origin main