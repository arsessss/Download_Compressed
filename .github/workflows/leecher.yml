name: Leech360D

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          FILENAME=$(basename "$URL" | cut -d"?" -f1)
          curl -L -o "$FILENAME" "$URL"
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "Add file" || true
          git push origin main
