name: Leech360D

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old zip files
        run: git rm -f --ignore-unmatch *.zip

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install yt-dlp and zip
        run: |
          pip3 install yt-dlp
          sudo apt-get install -y zip

      - name: Setup cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          fi

      - name: Download and create zip (with logging)
        run: |
          exec > >(tee -a logs.txt) 2>&1
          echo "=== DOWNLOAD LOG ==="
          echo "Time: $(date)"
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          echo "URL: $URL"
          echo "Quality: $QUALITY"
          export PATH="$HOME/.deno/bin:$PATH"
          
          if [[ "$URL" == *"youtube"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube mode"
            yt-dlp --cookies cookies.txt \
              --extractor-args "youtube:player_client=tv,android_sdkless" \
              --js-runtime deno \
              -f "best[height<=${QUALITY}]" \
              -o "video.mp4" \
              "$URL"
            FILENAME="video.mp4"
          else
            echo "Direct download mode"
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            [ -z "$FILENAME" ] && FILENAME="file.dat"
            curl -L -o "$FILENAME" "$URL"
          fi
          
          if [ -f "$FILENAME" ]; then
            BASENAME="${FILENAME%.*}"
            zip "${BASENAME}.zip" "$FILENAME"
            echo "Created: ${BASENAME}.zip"
            echo "ZIP_NAME=${BASENAME}.zip" >> $GITHUB_ENV
          else
            echo "ERROR: No file downloaded!"
            exit 1
          fi
          echo "=== END LOG ==="

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.zip logs.txt
          git commit -m "Add zip file and logs" || echo "No changes"
          git push origin main
