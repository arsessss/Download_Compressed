name: Transfer file to GitHub (supports YouTube links)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'Link 2 (optional)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'Link 3 (optional)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'Link 4 (optional)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'Link 5 (optional)'
        required: false
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      zip_password:
        description: '🔒 Set password for archive file'
        required: false
        type: string
        default: ''
      split_size:
        description: 'Maximum size per chunk (MB)'
        required: false
        type: choice
        default: '95  (maximum - for large files)'
        options:
          - '25  (slow internet - small files)'
          - '50  (medium)'
          - '95  (maximum - for large files)'

permissions:
  contents: write

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install yt-dlp and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full ffmpeg
          pip3 install yt-dlp

      - name: Create cookies file
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Parse inputs
        id: parse
        run: |
          SIZE=$(echo "${{ github.event.inputs.split_size }}" | grep -oP '\d+')
          echo "split_mb=${SIZE:-95}" >> $GITHUB_OUTPUT
          mkdir -p downloads

      - name: Download YouTube video
        id: download
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          echo "Downloading: $URL"
          yt-dlp --cookies cookies.txt \
            -f "bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]" \
            --merge-output-format mp4 \
            -o "video.mp4" \
            "$URL"
          
          if [ -f "video.mp4" ]; then
            echo "Download successful"
            ls -lh video.mp4
          else
            echo "Download failed"
            exit 1
          fi

      - name: Create 7z archive
        run: |
          SPLIT_MB=${{ steps.parse.outputs.split_mb }}
          PASSWORD="${{ github.event.inputs.zip_password }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          mkdir -p "downloads/${TIMESTAMP}"
          
          if [ -n "$PASSWORD" ]; then
            7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "downloads/${TIMESTAMP}/video.7z" "video.mp4"
          else
            7z a -mx=3 -v${SPLIT_MB}m "downloads/${TIMESTAMP}/video.7z" "video.mp4"
          fi
          
          echo "folder=downloads/${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/
          retention-days: 7

      - name: Cleanup old artifacts from repo
        run: |
          # Remove old downloads folder from git
          git rm -rf downloads/ 2>/dev/null || true
          rm -rf downloads/ 2>/dev/null || true
          
          # Commit and push cleanup if there were changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Cleanup old downloads"
          git push origin main 2>/dev/null || true

      - name: Summary
        run: |
          echo "## 📊 Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Video downloaded successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Download the artifact from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Dedicated to all those who have no way but to pass... - [Hossein Balanj](https://balanj.ir)" >> $GITHUB_STEP_SUMMARY
