name: Leech360D

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yt-dlp
        run: pip3 install yt-dlp && sudo apt-get install -y zip
      - name: Download
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          if [[ "$URL" == *"youtube"* ]]; then
            yt-dlp --js-runtime deno -f "best[height<=${{ github.event.inputs.youtube_quality }}]" -o "video.mp4" "$URL"
          else
            curl -L -o "file.dat" "$URL"
          fi
      - name: Zip
        run: zip -r archive.zip *.mp4 *.dat 2>/dev/null || echo "No files"
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add archive.zip
          git commit -m "Add archive" || true
          git push origin main
