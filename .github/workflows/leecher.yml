name: Transfer file to GitHub (supports YouTube & TikTok)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - YouTube, TikTok, or direct link'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'Link 2 (optional)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'Link 3 (optional)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'Link 4 (optional)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'Link 5 (optional)'
        required: false
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      tiktok_watermark:
        description: 'TikTok - include watermark?'
        required: false
        type: boolean
        default: true
      zip_password:
        description: '🔒 Set password for archive file'
        required: false
        type: string
        default: ''
      split_size:
        description: 'Maximum size per chunk (MB) - only splits files larger than this'
        required: false
        type: choice
        default: '95'
        options:
          - '25'
          - '50'
          - '95'
      delete_old_archives:
        description: 'Delete old archives'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: download-queue
  cancel-in-progress: false
  queue: max

jobs:
  download-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clean old archives
        if: ${{ github.event.inputs.delete_old_archives == 'true' }}
        run: |
          echo "Cleaning old archives..."
          find . -maxdepth 1 -type f \( -name "*.7z.*" -o -name "*.7z" \) -exec rm -v {} \;
          find . -maxdepth 1 -type d -name "downloads" -exec rm -rf {} \;
          git rm --cached *.7z.* 2>/dev/null || true
          git rm --cached *.7z 2>/dev/null || true
          git rm --cached -r downloads 2>/dev/null || true

      - name: Install dependencies
        run: |
          pip3 install yt-dlp --break-system-packages || pip3 install yt-dlp
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg p7zip-full

      - name: Create cookies file
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          fi

      - name: Parse inputs
        id: parse
        run: |
          SIZE="${{ github.event.inputs.split_size }}"
          echo "split_mb=${SIZE}" >> $GITHUB_OUTPUT
          cat > urls.txt << URLEOF
          ${{ github.event.inputs.file_url_1 }}
          ${{ github.event.inputs.file_url_2 }}
          ${{ github.event.inputs.file_url_3 }}
          ${{ github.event.inputs.file_url_4 }}
          ${{ github.event.inputs.file_url_5 }}
          URLEOF
          sed -i '/^$/d' urls.txt
          total=$(wc -l < urls.txt)
          echo "url_count=${total}" >> $GITHUB_OUTPUT

      - name: Download files
        id: download_files
        run: |
          mkdir -p files
          total=${{ steps.parse.outputs.url_count }}
          counter=1
          success=0
          YT_QUALITY="${{ github.event.inputs.youtube_quality }}"
          TT_WATERMARK="${{ github.event.inputs.tiktok_watermark }}"

          while IFS= read -r url; do
            echo "[$counter/$total] Processing: $url"

            if echo "$url" | grep -qE '(youtube\.com|youtu\.be)'; then
              echo "📺 YouTube"
              if [ -f cookies.txt ]; then
                yt-dlp --cookies cookies.txt -f "best[height<=${YT_QUALITY}]" -o "files/video_${counter}.mp4" "$url"
              else
                yt-dlp -f "best[height<=${YT_QUALITY}]" -o "files/video_${counter}.mp4" "$url"
              fi
              if [ -f "files/video_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | tr -cd 'a-zA-Z0-9_.- ' | cut -c1-50)
                mv "files/video_${counter}.mp4" "files/${TITLE}.mp4"
                success=$((success + 1))
              fi
              
            elif echo "$url" | grep -qE '(tiktok\.com|vm\.tiktok)'; then
              echo "📱 TikTok"
              yt-dlp -f "best" -o "files/tiktok_${counter}.mp4" "$url"
              if [ -f "files/tiktok_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | tr -cd 'a-zA-Z0-9_.- ' | cut -c1-40)
                mv "files/tiktok_${counter}.mp4" "files/${TITLE}.mp4"
                success=$((success + 1))
              fi
              
            else
              echo "🔗 Direct"
              FILENAME=$(basename "$url" | cut -d'?' -f1)
              curl -L --fail -o "files/${FILENAME}" "$url" && success=$((success + 1))
            fi
            
            counter=$((counter + 1))
          done < urls.txt

          echo "success_count=${success}" >> $GITHUB_OUTPUT

      - name: Archive files (only split if needed)
        id: process_files
        run: |
          SPLIT_MB=${{ steps.parse.outputs.split_mb }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          PASSWORD="${{ github.event.inputs.zip_password }}"

          counter=0
          for file in files/*; do
            [ -f "$file" ] || continue
            counter=$((counter + 1))
            BASENAME=$(basename "$file")
            NAME="${BASENAME%.*}"
            SIZE_MB=$(du -m "$file" | cut -f1)
            
            echo "Processing: $BASENAME (${SIZE_MB} MB)"
            
            # Only split if file is larger than split size
            if [ "$SIZE_MB" -gt "$SPLIT_MB" ]; then
              echo "File > ${SPLIT_MB}MB - splitting into ${SPLIT_MB}MB parts"
              if [ -n "$PASSWORD" ]; then
                7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "${FOLDER}/${NAME}.7z" "$file"
              else
                7z a -mx=3 -v${SPLIT_MB}m "${FOLDER}/${NAME}.7z" "$file"
              fi
              # If only one part was created, rename it
              if [ -f "${FOLDER}/${NAME}.7z.001" ] && [ ! -f "${FOLDER}/${NAME}.7z.002" ]; then
                mv "${FOLDER}/${NAME}.7z.001" "${FOLDER}/${NAME}.7z"
              fi
            else
              echo "File ≤ ${SPLIT_MB}MB - no split needed"
              if [ -n "$PASSWORD" ]; then
                7z a -p"$PASSWORD" -mhe=on -mx=3 "${FOLDER}/${NAME}.7z" "$file"
              else
                7z a -mx=3 "${FOLDER}/${NAME}.7z" "$file"
              fi
            fi
          done
          
          rm -rf files
          echo "processed_count=${counter}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Commit and Push
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          git add "${FOLDER}/"*.7z* 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Add files from ${FOLDER}"
            git push origin main
          fi

      - name: Summary
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          echo "✅ Done! Folder: ${FOLDER}"
