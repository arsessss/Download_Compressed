name: Leech360D

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete ALL existing zip files
        run: |
          echo "Deleting all .zip files from repository..."
          find . -name "*.zip" -type f -exec rm -vf {} \;
          echo "All zip files deleted"
          ls -la *.zip 2>/dev/null || echo "No zip files found"

      - name: Install yt-dlp and zip
        run: |
          pip3 install yt-dlp
          sudo apt-get install -y zip

      - name: Setup cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          fi

      - name: Download
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          if [[ "$URL" == *"youtube"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube mode"
            yt-dlp --cookies cookies.txt \
              --extractor-args "youtube:player_client=tv,android_sdkless" \
              --js-runtime deno \
              -f "best[height<=${QUALITY}]" \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"
          else
            echo "Direct download mode"
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            [ -z "$FILENAME" ] && FILENAME="file.dat"
            curl -L -o "downloads/$FILENAME" "$URL"
          fi
          echo "Downloaded files:"
          ls -la downloads/

      - name: Create and push zip
        run: |
          cd downloads
          FIRST_FILE=$(ls | head -1)
          BASENAME=$(echo "$FIRST_FILE" | sed "s/\.[^.]*$//")
          ZIP_NAME="${BASENAME}.zip"
          echo "Creating zip: $ZIP_NAME"
          zip -r "../$ZIP_NAME" .
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$ZIP_NAME"
          git commit -m "Add $ZIP_NAME" || echo "No changes"
          git push origin main
