name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean old files
        run: rm -f *.zip *.log

      - name: Install Deno and yt-dlp
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip3 install yt-dlp
          sudo apt-get install -y zip

      - name: Setup cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          fi

      - name: Download and log
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          export PATH="$HOME/.deno/bin:$PATH"
          {
            echo "=== DOWNLOAD LOG ==="
            echo "URL: $URL"
            echo "Quality: $QUALITY"
            echo "Time: $(date)"
            echo ""
            if [[ "$URL" == *"youtube"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
              echo "YouTube mode"
              yt-dlp --cookies cookies.txt \
                --extractor-args "youtube:player_client=tv,android_sdkless" \
                --js-runtime deno \
                -f "best[height<=${QUALITY}]" \
                -o "video.mp4" \
                "$URL" 2>&1
            else
              echo "Direct mode"
              FILENAME=$(basename "$URL" | cut -d"?" -f1)
              curl -L -o "$FILENAME" "$URL" 2>&1
            fi
            echo ""
            echo "Exit code: $?"
            echo "=== END ==="
          } | tee download.log

      - name: Create zip if video exists
        run: |
          if [ -f video.mp4 ]; then
            zip video.zip video.mp4
          elif [ -f *.dat ]; then
            zip file.zip *.dat
          fi

      - name: Save logs and files
        run: |
          cp download.log logs.txt
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add logs.txt *.zip 2>/dev/null || true
          git commit -m "Add logs and files" || true
          git push origin main
