name: Transfer file to GitHub (supports YouTube links)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean old files
        run: |
          echo "Cleaning old files..."
          rm -f *.zip
          rm -rf downloads
          git rm -f --ignore-unmatch *.zip 2>/dev/null || true

      - name: Install Deno and yt-dlp
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip3 install yt-dlp
          sudo apt-get install -y zip

      - name: Setup cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Download and create zip
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          echo "URL: $URL"
          echo "Quality: $QUALITY"
          
          if [[ "$URL" == *"youtube"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube mode"
            yt-dlp --cookies cookies.txt \
              --extractor-args "youtube:player_client=tv,android_sdkless" \
              --js-runtime deno \
              -f "best[height<=${QUALITY}]" \
              -o "video.mp4" \
              "$URL"
            FILENAME="video.mp4"
          else
            echo "Direct mode"
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            [ -z "$FILENAME" ] && FILENAME="file.dat"
            curl -L -o "$FILENAME" "$URL"
          fi
          
          if [ -f "$FILENAME" ]; then
            BASENAME="${FILENAME%.*}"
            zip "${BASENAME}.zip" "$FILENAME"
            echo "Created: ${BASENAME}.zip"
          else
            echo "ERROR: No file downloaded"
            exit 1
          fi

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.zip
          git commit -m "Add zip file" || echo "No changes"
          git push origin main
