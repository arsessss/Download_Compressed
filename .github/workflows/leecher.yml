name: Transfer file to GitHub (supports YouTube links)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      file_url_2:
        description: 'Link 2 (optional)'
        required: false
        type: string
        default: ''
      file_url_3:
        description: 'Link 3 (optional)'
        required: false
        type: string
        default: ''
      file_url_4:
        description: 'Link 4 (optional)'
        required: false
        type: string
        default: ''
      file_url_5:
        description: 'Link 5 (optional)'
        required: false
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      zip_password:
        description: '🔒 Set password for archive file'
        required: false
        type: string
        default: ''
      split_size:
        description: 'Maximum size per chunk (MB)'
        required: false
        type: choice
        default: '95  (maximum - for large files)'
        options:
          - '25  (slow internet - small files)'
          - '50  (medium)'
          - '95  (maximum - for large files)'
      delete_old_archives:
        description: 'Delete old archives (if checked, all previous archives will be removed)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sci-hub-queue
  cancel-in-progress: false
  queue: max

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Clean old archives
        if: ${{ github.event.inputs.delete_old_archives == 'true' }}
        run: |
          echo "Cleaning old archives..."
          find . -maxdepth 1 -type f \( -name "*.7z.*" -o -name "*.7z" \) -exec rm -v {} \;
          find . -maxdepth 1 -type d -name "downloads" -exec rm -rf {} \;
          git rm --cached *.7z.* 2>/dev/null || true
          git rm --cached *.7z 2>/dev/null || true
          git rm --cached -r downloads 2>/dev/null || true
          echo "Old archives cleaned."

      - name: Install Deno and yt-dlp with EJS support
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip3 install "yt-dlp[default]" yt-dlp-ejs --break-system-packages || pip3 install "yt-dlp[default]" yt-dlp-ejs
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz | tar -xJ
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          rm -rf ffmpeg-master-latest-linux64-gpl
          sudo apt-get update -qq && sudo apt-get install -y p7zip-full

      - name: Create cookies file from secret
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Parse inputs
        id: parse
        run: |
          SIZE=$(echo "${{ github.event.inputs.split_size }}" | grep -oP '\d+')
          echo "split_mb=${SIZE:-95}" >> $GITHUB_OUTPUT
          cat > urls.txt << URLEOF
          ${{ github.event.inputs.file_url_1 }}
          ${{ github.event.inputs.file_url_2 }}
          ${{ github.event.inputs.file_url_3 }}
          ${{ github.event.inputs.file_url_4 }}
          ${{ github.event.inputs.file_url_5 }}
          URLEOF
          sed -i '/^$/d' urls.txt
          sed -i 's/^[ \t]*//;s/[ \t]*$//' urls.txt
          total=$(wc -l < urls.txt)
          echo "url_count=${total}" >> $GITHUB_OUTPUT
          echo "URL count: ${total}"
          cat -n urls.txt

      - name: Download files (YouTube with Deno + cookies, direct via curl)
        id: download_files
        run: |
          mkdir -p files
          total=${{ steps.parse.outputs.url_count }}
          counter=1
          success=0
          YT_QUALITY="${{ github.event.inputs.youtube_quality }}"

          while IFS= read -r url; do
            echo "========================================="
            echo "[$counter/$total] Processing: $url"

            if echo "$url" | grep -qE '(youtube\.com|youtu\.be)'; then
              echo "Detected YouTube link. Requested quality: ${YT_QUALITY}p"
              echo "Downloading with yt-dlp + Deno + cookies..."

              yt-dlp --cookies cookies.txt \
                     --extractor-args "youtube:player_client=tv,android_sdkless" \
                     --js-runtime deno \
                     -f "bestvideo[height<=${YT_QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${YT_QUALITY}]" \
                     --merge-output-format mp4 \
                     -o "files/yt_video_${counter}.%(ext)s" \
                     "$url"

              DOWNLOADED_FILE=$(ls files/yt_video_${counter}.* 2>/dev/null | head -1)
              if [ -f "$DOWNLOADED_FILE" ]; then
                TITLE=$(yt-dlp --cookies cookies.txt --js-runtime deno --get-title "$url" 2>/dev/null | tr -cd 'a-zA-Z0-9_.-' | cut -c1-50)
                if [ -z "$TITLE" ]; then
                  TITLE="youtube_video_${counter}"
                fi
                mv "$DOWNLOADED_FILE" "files/${TITLE}.mp4"
                size=$(ls -lh "files/${TITLE}.mp4" | awk '{print $5}')
                echo "Downloaded: ${TITLE}.mp4 ($size)"
                success=$((success + 1))
              else
                echo "Failed to download YouTube video"
              fi
            else
              echo "Normal direct download"
              FILENAME_FROM_URL=$(echo "$url" | sed 's/?.*//' | xargs basename)
              if [ -z "$FILENAME_FROM_URL" ]; then
                FILENAME_FROM_URL="unknown_${counter}"
              fi
              FILENAME_BASE="${FILENAME_FROM_URL%.*}"
              FILENAME_EXT="${FILENAME_FROM_URL##*.}"
              if [ "$FILENAME_BASE" = "$FILENAME_FROM_URL" ]; then
                FILENAME_EXT=""
              fi
              PREFIX="sci-hub.ir"
              if [ "$total" -gt 1 ]; then
                NUM=$(printf '%02d' $counter)
                DL_NAME="${PREFIX}_${NUM}_${FILENAME_BASE}"
              else
                DL_NAME="${PREFIX}_${FILENAME_BASE}"
              fi
              MAXLEN=50
              if [ ${#DL_NAME} -gt $MAXLEN ]; then
                DL_NAME="${DL_NAME:0:$MAXLEN}"
              fi
              if [ -n "$FILENAME_EXT" ]; then
                FINAL_FILENAME="${DL_NAME}.${FILENAME_EXT}"
              else
                FINAL_FILENAME="${DL_NAME}"
              fi
              echo "Download filename: ${FINAL_FILENAME}"
              if curl -L --fail --retry 5 --retry-delay 10 --connect-timeout 30 -o "files/${FINAL_FILENAME}" "$url"; then
                size=$(ls -lh "files/${FINAL_FILENAME}" | awk '{print $5}')
                echo "Downloaded: ${FINAL_FILENAME} ($size)"
                success=$((success + 1))
              else
                echo "Failed: $url"
              fi
            fi
            counter=$((counter + 1))
          done < urls.txt

          echo "success_count=${success}" >> $GITHUB_OUTPUT

      - name: Process and archive each file
        id: process_files
        run: |
          SPLIT_MB=${{ steps.parse.outputs.split_mb }}
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="downloads/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          PASSWORD="${{ github.event.inputs.zip_password }}"

          echo "Output folder: ${FOLDER}"
          echo "Split size: ${SPLIT_MB}MB"

          counter=0
          for file in files/*; do
            [ -f "$file" ] || continue
            counter=$((counter + 1))
            echo "Processing: $(basename "$file")"
            FILENAME=$(basename "$file")
            if [ "${#PASSWORD}" -gt 0 ]; then
              7z a -p"$PASSWORD" -mhe=on -mx=3 -v${SPLIT_MB}m "${FOLDER}/${FILENAME}.7z" "$file"
            else
              7z a -mx=3 -v${SPLIT_MB}m "${FOLDER}/${FILENAME}.7z" "$file"
            fi
            if [ -f "${FOLDER}/${FILENAME}.7z.001" ] && [ ! -f "${FOLDER}/${FILENAME}.7z.002" ]; then
              mv "${FOLDER}/${FILENAME}.7z.001" "${FOLDER}/${FILENAME}.7z"
            fi
          done
          rm -rf files
          echo "processed_count=${counter}" >> $GITHUB_OUTPUT
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Commit and Push all chunks
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          git add "${FOLDER}/"*.7z* 2>/dev/null || true
          if ! git diff --staged --quiet; then
            file_count=$(git diff --staged --name-only | wc -l)
            git commit -m "Add files in ${FOLDER} (${file_count} chunks)"
            push_success=false
            max_attempts=15
            for attempt in $(seq 1 $max_attempts); do
              git pull --rebase origin main 2>/dev/null || true
              if git push origin main; then
                push_success=true
                break
              else
                sleep 20
              fi
            done
            if [ "$push_success" = false ]; then
              exit 1
            fi
          fi

      - name: Summary
        run: |
          FOLDER="${{ steps.process_files.outputs.folder }}"
          TOTAL_SIZE=$(du -sh "$FOLDER" 2>/dev/null | awk '{print $1}')
          [ -z "$TOTAL_SIZE" ] && TOTAL_SIZE="N/A"
          echo "Job completed! Folder: $FOLDER, Size: $TOTAL_SIZE"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📊 Execution Summary
          | Item | Value |
          |------|-------|
          | Successful downloads | ${{ steps.download_files.outputs.success_count }} / ${{ steps.parse.outputs.url_count }} |
          | Files processed | ${{ steps.process_files.outputs.processed_count }} |
          | Max chunk size | ${{ steps.parse.outputs.split_mb }} MB |
          | Total size | ${TOTAL_SIZE} |
          | 📂 Download folder | [${FOLDER}](https://github.com/${{ github.repository }}/tree/main/${FOLDER}) |
          | Status | ✅ Success |
          ---
          Dedicated to all those who have no way but to pass... - [Hossein Balanj](https://balanj.ir)
          EOF          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'
      tiktok_watermark:
        description: 'TikTok - include watermark?'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: download-queue
  cancel-in-progress: false
  queue: max

jobs:
  download-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          pip3 install yt-dlp --break-system-packages || pip3 install yt-dlp
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg p7zip-full

      - name: Create cookies file (if secret exists)
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies file created"
          else
            echo "⚠️ No cookies secret found"
          fi

      - name: Download files
        id: download_files
        run: |
          mkdir -p downloads
          success=0
          counter=1
          YT_QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          for url in "${{ github.event.inputs.file_url_1 }}" "${{ github.event.inputs.file_url_2 }}" "${{ github.event.inputs.file_url_3 }}" "${{ github.event.inputs.file_url_4 }}" "${{ github.event.inputs.file_url_5 }}"; do
            if [ -z "$url" ]; then
              continue
            fi
            
            echo "Processing [$counter]: $url"
            
            if echo "$url" | grep -qE '(youtube\.com|youtu\.be)'; then
              echo "📺 YouTube"
              if [ -f cookies.txt ]; then
                yt-dlp --cookies cookies.txt -f "best[height<=${YT_QUALITY}]" -o "downloads/video_${counter}.mp4" "$url"
              else
                yt-dlp -f "best[height<=${YT_QUALITY}]" -o "downloads/video_${counter}.mp4" "$url"
              fi
              if [ -f "downloads/video_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-50)
                mv "downloads/video_${counter}.mp4" "downloads/${TITLE}.mp4"
                echo "✅ Downloaded: ${TITLE}.mp4"
                success=$((success + 1))
              else
                echo "❌ YouTube download failed"
              fi
              
            elif echo "$url" | grep -qE '(tiktok\.com|vm\.tiktok)'; then
              echo "📱 TikTok"
              yt-dlp -f "best" -o "downloads/tiktok_${counter}.mp4" "$url"
              if [ -f "downloads/tiktok_${counter}.mp4" ]; then
                TITLE=$(yt-dlp --get-title "$url" 2>/dev/null | sed 's/[^a-zA-Z0-9._-]/_/g' | cut -c1-40)
                mv "downloads/tiktok_${counter}.mp4" "downloads/${TITLE}.mp4"
                echo "✅ Downloaded: ${TITLE}.mp4"
                success=$((success + 1))
              else
                echo "❌ TikTok download failed"
              fi
              
            else
              echo "🔗 Direct"
              FILENAME=$(basename "$url" | cut -d'?' -f1)
              curl -L --fail -o "downloads/${FILENAME}" "$url"
              if [ -f "downloads/${FILENAME}" ]; then
                echo "✅ Downloaded: ${FILENAME}"
                success=$((success + 1))
              else
                echo "❌ Direct download failed"
              fi
            fi
            
            counter=$((counter + 1))
          done
          
          echo "success_count=${success}" >> $GITHUB_OUTPUT

      - name: Create archive
        id: archive
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p "downloads_${TIMESTAMP}"
          mv downloads/* "downloads_${TIMESTAMP}/" 2>/dev/null || true
          
          7z a -mx=3 "archive_${TIMESTAMP}.7z" "downloads_${TIMESTAMP}/"
          
          echo "archive_name=archive_${TIMESTAMP}.7z" >> $GITHUB_OUTPUT
          rm -rf "downloads_${TIMESTAMP}"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.7z 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Add archive ${{ steps.archive.outputs.archive_name }}"
            git push origin main
          fi

      - name: Summary
        run: |
          echo "## ✅ Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Successful downloads | ${{ steps.download_files.outputs.success_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Archive | ${{ steps.archive.outputs.archive_name }} |" >> $GITHUB_STEP_SUMMARY          fi
