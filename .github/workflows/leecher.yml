name: Transfer file to GitHub

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Deno and yt-dlp
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip3 install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg p7zip-full
      
      - name: Setup cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "Cookies loaded"
          fi
      
      - name: Download
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          yt-dlp --cookies cookies.txt --extractor-args "youtube:player_client=tv,android_sdkless" --js-runtime deno -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]" --merge-output-format mp4 -o "downloads/video.mp4" "$URL"
          
          if [ -f downloads/video.mp4 ]; then
            echo "Download successful"
            ls -la downloads/
          else
            echo "Download failed"
            exit 1
          fi
      
      - name: Create archive
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          7z a -mx=3 "download_${TIMESTAMP}.7z" downloads/
      
      - name: Push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.7z
          git commit -m "Add downloaded video" || echo "No changes"
          git push origin main