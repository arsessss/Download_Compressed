name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean old files
        run: rm -f *.zip *.log

      - name: Install yt-dlp
        run: |
          pip3 install yt-dlp
          sudo apt-get install -y zip

      - name: Download and log
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          {
            echo "=== DOWNLOAD LOG ==="
            echo "URL: $URL"
            echo "Quality: $QUALITY"
            echo "Time: $(date)"
            echo ""
            if [[ "$URL" == *"youtube"* ]]; then
              echo "YouTube mode"
              yt-dlp -f "best[height<=${QUALITY}]" -o "video.mp4" "$URL" 2>&1
            else
              echo "Direct mode"
              curl -L -o "file.dat" "$URL" 2>&1
            fi
            echo ""
            echo "Exit code: $?"
            echo "=== END ==="
          } | tee download.log

      - name: Save logs
        run: |
          cp download.log logs.txt
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add logs.txt *.zip 2>/dev/null || true
          git commit -m "Add logs" || true
          git push origin main
