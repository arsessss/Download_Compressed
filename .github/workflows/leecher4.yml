name: Leech360D v4

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
      - name: Install yt-dlp
        run: |
          pip3 install yt-dlp
          sudo apt-get install -y zip
      - name: Use cookies
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt
      - name: Run download
        id: download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          {
            echo "=== DOWNLOAD LOG ==="
            echo "URL: $URL"
            echo "Quality: $QUALITY"
            echo "Time: $(date)"
            echo ""
            if [[ "$URL" == *"youtube"* ]]; then
              echo "YouTube mode with Deno"
              yt-dlp --cookies cookies.txt --js-runtime deno -f "best[height<=${QUALITY}]" -o "downloads/%(title)s.%(ext)s" "$URL"
            else
              FILENAME=$(basename "$URL" | cut -d"?" -f1)
              curl -L -o "downloads/$FILENAME" "$URL"
            fi
            echo ""
            echo "Exit code: $?"
            echo "=== END LOG ==="
          } | tee logs.txt
          exit 0
      - name: Zip files
        run: |
          if [ -d downloads ] && [ "$(ls -A downloads)" ]; then
            cd downloads
            FIRST_FILE=$(ls | head -1)
            BASENAME="${FIRST_FILE%.*}"
            zip -r "../${BASENAME}.zip" .
            cd ..
            echo "BASENAME=$BASENAME" >> $GITHUB_ENV
          fi
      - name: Push logs and files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs.txt *.zip 2>/dev/null || true
          git commit -m "Update logs and files" || true
          git push origin main
