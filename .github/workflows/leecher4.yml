name: Leech360D v4

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
      - name: Install yt-dlp
        run: |
          pip3 install yt-dlp
          sudo apt-get install -y zip
      - name: Use cookies from secret
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          echo "Cookies loaded from secret"
      - name: Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          if [[ "$URL" == *"youtube"* ]]; then
            echo "YouTube mode with Deno"
            yt-dlp --cookies cookies.txt \
              --js-runtime deno \
              -f "best[height<=${{ github.event.inputs.youtube_quality }}]" \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"
          else
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            curl -L -o "downloads/$FILENAME" "$URL"
          fi
      - name: Get filename
        run: |
          cd downloads
          FIRST_FILE=$(ls | head -1)
          BASENAME="${FIRST_FILE%.*}"
          echo "BASENAME=$BASENAME" >> $GITHUB_ENV
          cd ..
      - name: Create zip
        run: cd downloads && zip -r "../${BASENAME}.zip" . && cd ..
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add "${BASENAME}.zip"
          git commit -m "Add ${BASENAME}.zip" || true
          git push origin main
