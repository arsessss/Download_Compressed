name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean old files
        run: rm -f *.zip *.log

      - name: Install Deno and yt-dlp
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip3 install yt-dlp[default] yt-dlp-ejs
          sudo apt-get install -y zip

      - name: Use cookies from secret
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Download and log
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          {
            echo "=== DOWNLOAD LOG ==="
            echo "URL: $URL"
            echo "Quality: $QUALITY"
            echo "Time: $(date)"
            echo ""
            if [[ "$URL" == *"youtube"* ]]; then
              echo "YouTube mode with Deno + cookies"
              yt-dlp --cookies cookies.txt \
                --extractor-args "youtube:player_client=tv,android_sdkless" \
                --js-runtime deno \
                -f "best[height<=${QUALITY}]" \
                -o "downloads/%(title)s.%(ext)s" \
                "$URL" 2>&1
            else
              echo "Direct mode"
              FILENAME=$(basename "$URL" | cut -d"?" -f1)
              curl -L -o "downloads/$FILENAME" "$URL" 2>&1
            fi
            echo ""
            echo "Exit code: $?"
            echo "=== END ==="
          } | tee download.log

      - name: Get filename
        run: |
          cd downloads
          FIRST_FILE=$(ls | head -1)
          BASENAME="${FIRST_FILE%.*}"
          echo "BASENAME=$BASENAME" >> $GITHUB_ENV
          cd ..

      - name: Create zip
        run: cd downloads && zip -r "../${BASENAME}.zip" . && cd ..

      - name: Save logs and push
        run: |
          cp download.log logs.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs.txt *.zip 2>/dev/null || true
          git commit -m "Add ${BASENAME}.zip and logs" || echo "No changes to commit"
          git push origin main || echo "Push failed but continuing"
