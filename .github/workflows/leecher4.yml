name: Leech360D v4

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yt-dlp
        run: pip3 install yt-dlp && sudo apt-get install -y zip
      - name: Create cookies
        run: |
          cat > cookies.txt << "EOF"
# Netscape HTTP Cookie File
.youtube.com	TRUE	/	TRUE	0	VISITOR_INFO1_LIVE	tI3-DVIcilc
.youtube.com	TRUE	/	TRUE	0	__Secure-1PAPISID	9N0lmr6YxXFHjUhg/AH0ZCX-UsocxzegOM
.youtube.com	TRUE	/	TRUE	0	__Secure-1PSID	g.a0007AhxenGQsnN0naCotUWUiNoxWaKmWdJ1klawmMp2boUqMd_TeT7BJFQ6j30socdbOZN7LQACgYKAbISARQSFQHGX2MiGjUKHf38LdWu9iFteRQMAxoVAUF8yKpwyLtuly3A77cJy5BkV15T0076
          EOF
          echo "Cookies created"
          wc -l cookies.txt
      - name: Download
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          if [[ "$URL" == *"youtube"* ]]; then
            echo "Testing cookies..."
            yt-dlp --cookies cookies.txt --js-runtime deno -f "best[height<=${{ github.event.inputs.youtube_quality }}]" -o "downloads/%(title)s.%(ext)s" "$URL" 2>&1
          else
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            curl -L -o "downloads/$FILENAME" "$URL"
          fi
      - name: Get filename
        run: |
          cd downloads
          if [ -f "$(ls | head -1)" ]; then
            FIRST_FILE=$(ls | head -1)
            BASENAME="${FIRST_FILE%.*}"
            echo "BASENAME=$BASENAME" >> $GITHUB_ENV
          fi
          cd ..
      - name: Create zip
        if: env.BASENAME != ""
        run: cd downloads && zip -r "../${BASENAME}.zip" . && cd ..
      - name: Push
        if: env.BASENAME != ""
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add "${BASENAME}.zip"
          git commit -m "Add ${BASENAME}.zip" || true
          git push origin main
