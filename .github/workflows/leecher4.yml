name: Leech360D

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: URL
        required: true
        type: string
      youtube_quality:
        description: Quality
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yt-dlp
        run: pip3 install yt-dlp && sudo apt-get install -y zip
      - name: Download
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          if [[ "$URL" == *"youtube"* ]]; then
            yt-dlp --js-runtime deno -f "best[height<=${{ github.event.inputs.youtube_quality }}]" -o "downloads/%(title)s.%(ext)s" "$URL"
          else
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            curl -L -o "downloads/$FILENAME" "$URL"
          fi
      - name: Get filename
        run: |
          cd downloads
          FIRST_FILE=$(ls | head -1)
          BASENAME="${FIRST_FILE%.*}"
          echo "BASENAME=$BASENAME" >> $GITHUB_ENV
          cd ..
      - name: Create zip
        run: cd downloads && zip -r "../${BASENAME}.zip" . && cd ..
      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add "${BASENAME}.zip"
          git commit -m "Add ${BASENAME}.zip" || true
          git push origin main
