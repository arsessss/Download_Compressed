name: Get Video Metadata

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube or TikTok URL'
        required: true
        type: string

jobs:
  get-metadata:
    runs-on: ubuntu-latest
    outputs:
      title: ${{ steps.metadata.outputs.title }}
      thumbnail: ${{ steps.metadata.outputs.thumbnail }}
      duration: ${{ steps.metadata.outputs.duration }}
      uploader: ${{ steps.metadata.outputs.uploader }}
      
    steps:
      - name: Install yt-dlp (fixed)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install yt-dlp
          
      - name: Get video metadata
        id: metadata
        run: |
          URL="${{ github.event.inputs.video_url }}"
          
          echo "Processing URL: $URL"
          
          # Get metadata using yt-dlp
          TITLE=$(python3 -m yt_dlp --skip-download --get-title "$URL" 2>/dev/null | head -1)
          THUMBNAIL=$(python3 -m yt_dlp --skip-download --get-thumbnail "$URL" 2>/dev/null | head -1)
          DURATION=$(python3 -m yt_dlp --skip-download --get-duration "$URL" 2>/dev/null | head -1)
          UPLOADER=$(python3 -m yt_dlp --skip-download --get-uploader "$URL" 2>/dev/null | head -1)
          
          # Fallbacks if empty
          if [ -z "$TITLE" ]; then 
            TITLE="Unknown Title"
          fi
          
          if [ -z "$DURATION" ] || [ "$DURATION" = "NA" ]; then 
            DURATION="Unknown"
          fi
          
          if [ -z "$UPLOADER" ]; then 
            UPLOADER="Unknown"
          fi
          
          # For YouTube, create fallback thumbnail
          if echo "$URL" | grep -qiE '(youtube|youtu.be)'; then
            VIDEO_ID=$(echo "$URL" | grep -oE '(v=|be/|youtu.be/)([a-zA-Z0-9_-]{11})' | head -1 | sed 's/.*=//;s/.*\///')
            if [ -n "$VIDEO_ID" ] && [ -z "$THUMBNAIL" ]; then
              THUMBNAIL="https://img.youtube.com/vi/${VIDEO_ID}/hqdefault.jpg"
            fi
            if [ -z "$THUMBNAIL" ]; then
              THUMBNAIL="https://i.ytimg.com/vi/${VIDEO_ID}/hqdefault.jpg"
            fi
          fi
          
          if [ -z "$THUMBNAIL" ]; then
            THUMBNAIL="https://via.placeholder.com/120x90/1a1a1a/ffffff?text=No+Thumb"
          fi
          
          # Clean up title (remove special characters)
          CLEAN_TITLE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9Д…ДҮДҷЕӮЕ„ГіЕӣЕәЕјД„ДҶДҳЕҒЕғГ“ЕҡЕ№Е»\s\-_]//g' | cut -c1-100)
          
          # Set outputs
          echo "title=$CLEAN_TITLE" >> $GITHUB_OUTPUT
          echo "thumbnail=$THUMBNAIL" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "uploader=$UPLOADER" >> $GITHUB_OUTPUT
          
          # Also echo for log visibility
          echo "вң… Title: $CLEAN_TITLE"
          echo "рҹ“ё Thumbnail: $THUMBNAIL"
          echo "вҸұпёҸ Duration: $DURATION"
          echo "рҹ‘Ө Uploader: $UPLOADER"
