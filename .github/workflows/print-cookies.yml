name: Print YT_COOKIES Secret

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Save cookies to logs.txt
        run: |
          echo "=== YT_COOKIES CONTENT ===" > logs.txt
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "Secret exists" >> logs.txt
            echo "" >> logs.txt
            echo "${{ secrets.YT_COOKIES }}" >> logs.txt
          else
            echo "Secret does NOT exist" >> logs.txt
          fi
          cat logs.txt
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs.txt
          git commit -m "Update cookies log" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git HEAD:main
