name: Print YT_COOKIES Secret

on:
  workflow_dispatch:

jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Save cookies to logs.txt
        run: |
          echo "=== YT_COOKIES CONTENT ===" > logs.txt
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "✅ Secret exists" >> logs.txt
            echo "Length: ${{ secrets.YT_COOKIES }} | wc -c" >> logs.txt
            echo "" >> logs.txt
            echo "Full content:" >> logs.txt
            echo "${{ secrets.YT_COOKIES }}" >> logs.txt
            echo "" >> logs.txt
            echo "First line:" >> logs.txt
            echo "${{ secrets.YT_COOKIES }}" | head -1 >> logs.txt
          else
            echo "❌ YT_COOKIES secret does NOT exist" >> logs.txt
          fi
          echo "=== END ===" >> logs.txt
      - name: Commit and push logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs.txt
          git commit -m "Update cookies debug logs" || echo "No changes"
          git push origin main
