name: Transfer file to GitHub - v2

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old zip files
        run: |
          rm -f *.zip

      - name: Install yt-dlp and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          pip3 install yt-dlp

      - name: Download file
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          echo "URL: $URL"
          echo "Quality: $QUALITY"
          if [[ "$URL" == *"youtube"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube detected"
            yt-dlp -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]" --merge-output-format mp4 -o "downloads/video.mp4" "$URL"
          else
            echo "Direct download detected"
            curl -L -o "downloads/file.dat" "$URL"
          fi

      - name: Create zip
        run: |
          zip -r archive.zip downloads/
          echo "ZIP_NAME=archive.zip" >> $GITHUB_ENV

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.zip
          git commit -m "Add archive" || true
          git push origin main
