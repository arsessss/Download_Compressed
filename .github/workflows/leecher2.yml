name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'File URL (YouTube or direct link)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clean old files
        run: rm -f *.zip && rm -rf downloads

      - name: Install yt-dlp
        run: |
          pip3 install yt-dlp
          sudo apt-get install -y zip

      - name: Download (Android client method)
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "Using Android client to bypass blocks"
            yt-dlp \
              --extractor-args "youtube:player_client=android" \
              -f "best[height<=${QUALITY}]" \
              -o "downloads/video.%(ext)s" \
              "$URL"
          else
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            curl -L -o "downloads/$FILENAME" "$URL"
          fi

      - name: Create zip
        run: cd downloads && zip -r ../archive.zip . && cd ..

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.zip
          git commit -m "Add archive" || true
          git push origin main
