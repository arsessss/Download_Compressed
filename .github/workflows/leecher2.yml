name: Transfer file to GitHub - v2 (ZIP with cleanup)

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download-and-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old zip files
        run: |
          echo "Deleting old .zip files..."
          rm -f *.zip
          echo "Old archives deleted."

      - name: Install yt-dlp and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          pip3 install yt-dlp

      - name: Download file (YouTube or direct)
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "Detected YouTube link"
            yt-dlp -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]" \
                   --merge-output-format mp4 \
