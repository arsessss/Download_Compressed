name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'File URL (YouTube or direct link)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clean up old files
        run: |
          rm -f *.zip
          rm -rf downloads

      - name: Install Deno and dependencies
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install yt-dlp yt-dlp-ejs
          sudo apt-get update && sudo apt-get install -y zip

      - name: Setup cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "Cookies file created"
          else
            echo "No cookies found, continuing without"
          fi

      - name: Download file
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          echo "URL: $URL"
          echo "Quality: $QUALITY"
          
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube mode with Deno runtime"
            export PATH="$HOME/.deno/bin:$PATH"
            yt-dlp \
              --cookies cookies.txt \
              --extractor-args "youtube:player_client=tv,android_sdkless" \
              --js-runtime deno \
              -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]" \
              --merge-output-format mp4 \
              --retries 5 \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"
          else
            echo "Direct download mode"
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
              FILENAME="downloaded_file"
            fi
            curl -L --fail --retry 3 --retry-delay 2 --max-time 600 -o "downloads/$FILENAME" "$URL"
          fi
          
          if [ $? -eq 0 ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
            echo "Download successful"
            ls -la downloads/
          else
            echo "Download failed"
            exit 1
          fi

      - name: Create zip archive
        run: |
          cd downloads
          FIRST_FILE=$(ls | head -1)
          BASENAME="${FIRST_FILE%.*}"
          ZIP_NAME="${BASENAME}.zip"
          zip -r "../$ZIP_NAME" .
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          cd ..
          echo "Archive created: $ZIP_NAME"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.ZIP_NAME }}"
          git commit -m "Add ${{ env.ZIP_NAME }}" || echo "No changes"
          git push origin main
