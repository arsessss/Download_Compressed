name: Minimal Test

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'URL to download'
        required: true
        type: string
        default: 'https://speed.hetzner.de/100MB.bin'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download
        run: curl -L -o testfile.bin "${{ github.event.inputs.file_url_1 }}"
      - name: Zip
        run: zip test.zip testfile.bin
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add test.zip
          git commit -m "test" || true
          git push origin main
