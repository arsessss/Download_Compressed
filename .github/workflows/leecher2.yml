name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'File URL (YouTube or direct link)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clean up old files
        run: |
          rm -f *.zip
          rm -rf downloads

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          pip3 install yt-dlp

      - name: Download file
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          echo "URL: $URL"
          echo "Quality: $QUALITY"
          
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube mode"
            yt-dlp \
              -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]/best" \
              --merge-output-format mp4 \
              --retries 5 \
              --fragment-retries 5 \
              -o "downloads/video.mp4" \
              "$URL"
          else
            echo "Direct download mode"
            curl -L --fail --retry 3 --retry-delay 2 --max-time 600 -o "downloads/file.dat" "$URL"
          fi
          
          if [ $? -eq 0 ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
            echo "Download successful"
            ls -la downloads/
          else
            echo "Download failed or no files downloaded"
            exit 1
          fi

      - name: Create zip archive
        run: |
          cd downloads
          zip -r ../archive.zip .
          cd ..
          echo "Archive created: archive.zip"
          ls -la archive.zip

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.zip
          git commit -m "Add downloaded archive" || echo "No changes to commit"
          git push origin main
