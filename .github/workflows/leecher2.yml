name: Transfer file to GitHub - v2

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old zip files
        run: |
          echo "Deleting old .zip files..."
          rm -f *.zip
          echo "Done."

      - name: Install yt-dlp and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          pip3 install yt-dlp

      - name: Download file
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "Downloading YouTube video..."
            yt-dlp -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "$URL"
          else
            echo "Downloading direct file..."
            FILENAME=$(basename "$URL" | cut -d'?' -f1)
            curl -L -o "downloads/${FILENAME}" "$URL"
          fi
          ls -la downloads/

      - name: Create zip archive
        run: |
          cd downloads
          FIRST_FILE=$(ls | head -1)
          BASENAME=$(echo "$FIRST_FILE" | sed 's/\.[^.]*$//')
          ZIP_NAME="${BASENAME}.zip"
          zip -r "../$ZIP_NAME" .
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          cd ..
          echo "Created: $ZIP_NAME"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.ZIP_NAME }}"
          git commit -m "Add ${{ env.ZIP_NAME }}" || echo "No changes to commit"
          git push origin main
