name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'File URL (YouTube or direct link)'
        required: true
        type: string
      youtube_quality:
        description: 'YouTube quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clean up old files
        run: |
          rm -f *.zip
          rm -rf downloads

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          pip3 install yt-dlp

      - name: Setup cookies
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          if [ -s cookies.txt ]; then
            echo "✅ Cookies file created with $(wc -l < cookies.txt) lines"
          else
            echo "⚠️ Cookies file is empty"
          fi

      - name: Download file
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          echo "URL: $URL"
          echo "Quality: $QUALITY"
          
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube mode with cookies"
            yt-dlp \
              --cookies cookies.txt \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -f "bestvideo[height<=${QUALITY}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${QUALITY}]/best" \
              --merge-output-format mp4 \
              --retries 10 \
              --sleep-interval 5 \
              --max-sleep-interval 10 \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL"
          else
            echo "Direct download mode"
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
              FILENAME="downloaded_file"
            fi
            curl -L --fail --retry 3 --retry-delay 2 --max-time 600 -o "downloads/$FILENAME" "$URL"
          fi
          
          DOWNLOAD_EXIT_CODE=$?
          if [ $DOWNLOAD_EXIT_CODE -eq 0 ] && [ "$(ls -A downloads 2>/dev/null)" ]; then
            echo "✅ Download successful"
            ls -la downloads/
          else
            echo "❌ Download failed with exit code: $DOWNLOAD_EXIT_CODE"
            cat downloads/* 2>/dev/null || echo "No output file"
            exit 1
          fi

      - name: Create zip archive
        run: |
          cd downloads
          FIRST_FILE=$(ls | head -1)
          BASENAME=$(echo "$FIRST_FILE" | sed "s/\.[^.]*$//")
          ZIP_NAME="${BASENAME}.zip"
          zip -r "../$ZIP_NAME" .
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          cd ..
          echo "✅ Archive created: $ZIP_NAME"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.ZIP_NAME }}"
          git commit -m "Add ${{ env.ZIP_NAME }}" || echo "No changes to commit"
          git push origin main
