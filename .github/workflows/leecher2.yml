name: Leech360D Downloader

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'Link 1 (required) - can be YouTube or direct link'
        required: true
        type: string
        default: ''
      youtube_quality:
        description: 'Quality for YouTube links'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clean old files
        run: rm -f *.zip *.log && rm -rf downloads

      - name: Install Deno and yt-dlp
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip3 install yt-dlp
          sudo apt-get install -y zip

      - name: Setup cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          fi

      - name: Download (with logging)
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          LOG_FILE="download_log.txt"
          
          echo "=== DOWNLOAD LOG ===" > $LOG_FILE
          echo "URL: $URL" >> $LOG_FILE
          echo "Quality: $QUALITY" >> $LOG_FILE
          echo "Time: $(date)" >> $LOG_FILE
          echo "" >> $LOG_FILE
          
          if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]]; then
            echo "YouTube mode" | tee -a $LOG_FILE
            yt-dlp --cookies cookies.txt \
              --extractor-args "youtube:player_client=tv,android_sdkless" \
              --js-runtime deno \
              -f "best[height<=${QUALITY}]" \
              -o "downloads/%(title)s.%(ext)s" \
              "$URL" 2>&1 | tee -a $LOG_FILE
          else
            echo "Direct mode" | tee -a $LOG_FILE
            curl -L -o "downloads/$(basename "$URL" | cut -d"?" -f1)" "$URL" 2>&1 | tee -a $LOG_FILE
          fi
          
          echo "" >> $LOG_FILE
          echo "Exit code: $?" >> $LOG_FILE
          echo "=== END LOG ===" >> $LOG_FILE

      - name: Save logs
        if: always()
        run: |
          cp download_log.txt logs.txt
          echo "LOGS_SAVED=true" >> $GITHUB_ENV

      - name: Get filename
        if: success()
        run: |
          cd downloads
          if [ "$(ls -A)" ]; then
            FIRST_FILE=$(ls | head -1)
            BASENAME="${FIRST_FILE%.*}"
            echo "BASENAME=$BASENAME" >> $GITHUB_ENV
          fi
          cd ..

      - name: Create zip
        if: success() && env.BASENAME != ""
        run: cd downloads && zip -r "../${BASENAME}.zip" . && cd ..

      - name: Commit logs and files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs.txt *.zip 2>/dev/null || true
          git commit -m "Add download logs and files" || echo "No changes"
          git push origin main
