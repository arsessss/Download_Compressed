name: Leech360D Fast

on:
  workflow_dispatch:
    inputs:
      file_url_1:
        description: 'File URL (YouTube or direct)'
        required: true
        type: string
      youtube_quality:
        description: 'Quality'
        required: false
        type: choice
        default: '1080'
        options:
          - '2160'
          - '1440'
          - '1080'
          - '720'
          - '480'
          - '360'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean & Install
        run: |
          rm -f *.zip
          sudo apt-get update -qq && sudo apt-get install -y zip
          pip3 install -q yt-dlp

      - name: Download
        run: |
          URL="${{ github.event.inputs.file_url_1 }}"
          QUALITY="${{ github.event.inputs.youtube_quality }}"
          
          if echo "$URL" | grep -qE "youtube|youtu.be"; then
            yt-dlp -f "best[height<=${QUALITY}]" -o "downloaded.%(ext)s" "$URL"
            FILENAME=$(ls downloaded.* 2>/dev/null | head -1)
          else
            FILENAME=$(basename "$URL" | cut -d"?" -f1)
            curl -L --fail -o "$FILENAME" "$URL"
          fi
          
          if [ -f "$FILENAME" ]; then
            ZIP_NAME="${FILENAME%.*}.zip"
            zip -j "$ZIP_NAME" "$FILENAME"
            echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          fi

      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@localhost"
          git add "${{ env.ZIP_NAME }}"
          git commit -m "Add ${{ env.ZIP_NAME }}" || true
          git push origin main
